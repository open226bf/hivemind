        messages are raw terminal output. Authenticate with ?ticket=<id> from POST
        /services/{id}/exec/ticket (WebSocket cannot carry an Authorization header;
        the ticket avoids putting the access token in the URL). Requires the Admin
        role.'
      parameters:
      - description: Service ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Target container ID (from /services/{id}/tasks)
        in: query
        name: container
        required: true
        type: string
      - description: Single-use exec ticket
        in: query
        name: ticket
        required: true
        type: string
      - description: Shell command (default /bin/sh)
        in: query
        name: cmd
        type: string
      responses:
        "101":
          description: Switching Protocols
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
        "409":
          description: service not deployed
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
      summary: Interactive container shell (WebSocket, Admin)
      tags:
      - supervision
  /services/{id}/exec/ticket:
    post:
      description: Exchanges the bearer token for a short-lived, single-use ticket
        bound to the caller and this service. The web terminal then opens the exec
        WebSocket with ?ticket=<id> instead of putting the access token in the URL
        (browsers cannot set headers on a WebSocket, and URLs leak into logs).
      parameters:
      - description: Service ID (UUID)
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: ticket and expires_in (seconds)
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
      security:
