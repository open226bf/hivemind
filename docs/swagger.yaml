  /services/{id}/exec:
    get:
      description: 'Upgrades to a WebSocket and attaches an interactive TTY exec session
        to one of the service''s containers. Client→server text messages are tagged
        by a leading byte: ''0''=stdin data, ''1''=JSON resize {cols,rows}. Server→client
        messages are raw terminal output. Authenticate with ?token=<access_token>
        (WebSocket cannot carry an Authorization header). Requires the Admin role.'
      parameters:
      - description: Service ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Target container ID (from /services/{id}/tasks)
        in: query
        name: container
        required: true
        type: string
      - description: Access token
        in: query
        name: token
        required: true
        type: string
      - description: Shell command (default /bin/sh)
        in: query
        name: cmd
        type: string
      responses:
        "101":
          description: Switching Protocols
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
        "409":
          description: service not deployed
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
      summary: Interactive container shell (WebSocket, Admin)
      tags:
      - supervision
  /services/{id}/logs:
    get:
      description: 'Streams the service''s aggregated container logs as Server-Sent
        Events. Each log line is delivered as a `data:` event; an `event: end` frame
        closes a non-follow stream. With follow=true the stream stays open until the
        client disconnects. Authenticate with a Bearer token (use fetch/ReadableStream,
        not EventSource).'
      parameters:
      - description: Service ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Keep the stream open (default true)
        in: query
        name: follow
        type: boolean
      - description: Number of trailing lines, or 'all' (default 200)
        in: query
        name: tail
        type: string
      - description: Prefix each line with an RFC3339 timestamp
        in: query
        name: timestamps
        type: boolean
      - description: Only logs since this time (RFC3339 or duration like 10m)
        in: query
        name: since
        type: string
      produces:
      - text/event-stream
      responses:
        "200":
          description: text/event-stream of log lines
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
        "409":
          description: service not deployed
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
        "503":
          description: deployment engine not configured
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Stream a service's logs (SSE, F-V2-01)
      tags:
      - supervision
