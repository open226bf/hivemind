            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List a service's environment variables
      tags:
      - services
    put:
      consumes:
      - application/json
      description: Atomically replaces the full set of env vars (F-MVP-04). The submitted
        list is authoritative — omitted keys are removed. Keys must match ^[A-Z_][A-Z0-9_]*$
        and be unique. Secret values are encrypted at rest.
      parameters:
      - description: Service ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Full env var set
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.SetEnvVarsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.EnvVarsResponse'
        "400":
          description: validation_error
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
        "404":
          description: Not Found
