        type: string
      update_config:
        $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.UpdateConfigDTO'
    type: object
host: localhost:8080
info:
  contact:
    email: issadicko78@gmail.com
    name: Équipe technique Hivemind
  description: Plateforme de déploiement autonome pour Docker Swarm.
  license:
    name: Proprietary
  title: Hivemind API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Returns an access token (15 min) and a refresh token (7 days).
      parameters:
      - description: Credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.TokenResponse'
        "400":
          description: validation_error
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
        "401":
          description: invalid email or password
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
        "403":
          description: account inactive
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
        "429":
          description: account temporarily locked
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
      summary: Authenticate by email/password
      tags:
      - auth
  /auth/logout:
    post:
      description: 'Stateless JWT: the client discards both tokens. A server-side
        blocklist will be added post-MVP.'
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Log out
      tags:
      - auth
  /auth/me:
    get:
      description: Returns id, email and role of the user owning the access token.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.MeResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Return the authenticated user
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: The old refresh token is implicitly invalidated on the client side
        (stateless MVP).
      parameters:
      - description: Refresh token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.TokenResponse'
        "400":
          description: validation_error
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
        "401":
          description: invalid or expired token
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
      summary: Exchange a refresh token for a new token pair
      tags:
      - auth
  /configs:
    get:
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 20, max 100)
        in: query
        name: size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ConfigListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List configs
      tags:
      - configs
    post:
      consumes:
      - application/json
      description: Stores a cleartext config file (UTF-8, max 500 KB) as version 1.
      parameters:
      - description: Config definition
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.CreateConfigRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ConfigResponse'
        "400":
          description: validation_error
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
        "409":
          description: name already taken
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
        "422":
          description: invalid name, content too large or invalid UTF-8
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a config
      tags:
      - configs
  /configs/{id}:
    delete:
      description: Fails if the config is still attached to any service.
      parameters:
      - description: Config ID (UUID)
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
        "409":
          description: config in use
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a config
      tags:
      - configs
    get:
      description: Returns config metadata (no content — use the versions endpoint
        to read content).
      parameters:
      - description: Config ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ConfigResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get a config
      tags:
      - configs
  /configs/{id}/versions:
    get:
      description: Returns the full version history with content, newest first.
      parameters:
      - description: Config ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ConfigVersionResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List config versions
      tags:
      - configs
    post:
      consumes:
      - application/json
      description: Stores new content as the next version. Attached services pick
        it up on their next deployment.
      parameters:
      - description: Config ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: New content
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.AddConfigVersionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ConfigResponse'
        "400":
          description: validation_error
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
        "422":
          description: content too large or invalid UTF-8
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Add a config version
      tags:
      - configs
  /deployments:
    get:
      description: Global deployment history, filterable by service, status and time
        range (RFC3339), newest first.
      parameters:
      - description: Filter by service ID (UUID)
        in: query
        name: service_id
        type: string
      - description: Filter by status (pending | in_progress | succeeded | failed
          | rolled_back)
        in: query
        name: status
        type: string
      - description: Started at >= (RFC3339)
        in: query
        name: from
        type: string
      - description: Started at <= (RFC3339)
        in: query
        name: to
        type: string
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 20, max 100)
        in: query
        name: size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.DeploymentListResponse'
        "400":
