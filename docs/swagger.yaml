host: localhost:8080
info:
  contact:
    email: issadicko78@gmail.com
    name: Équipe technique Hivemind
  description: Plateforme de déploiement autonome pour Docker Swarm.
  license:
    name: Proprietary
  title: Hivemind API
  version: "1.0"
paths:
  /agent/heartbeat:
    post:
      consumes:
      - application/json
      parameters:
      - description: Heartbeat
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.AgentHeartbeatRequest'
      responses:
        "204":
          description: no content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
      summary: Agent liveness heartbeat
      tags:
      - agent
  /agent/install:
    get:
      description: Returns a self-contained shell script to run on a cluster manager
        (creates secrets, writes the compose and runs docker stack deploy). Authenticated
        by the enrollment token.
      parameters:
      - description: Enrollment token
        in: query
        name: token
        required: true
        type: string
      produces:
      - text/plain
      responses:
        "200":
          description: shell script
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
      summary: Agent install script
      tags:
      - agent
  /agent/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Agent registration
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.AgentRegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.AgentRegisterResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
      summary: Agent enrollment / reconnection
      tags:
      - agent
  /auth/login:
    post:
      consumes:
      - application/json
      description: Returns an access token (15 min) and a refresh token (7 days).
      parameters:
      - description: Credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.TokenResponse'
        "400":
          description: validation_error
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
        "401":
          description: invalid email or password
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
        "403":
          description: account inactive
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
        "429":
          description: account temporarily locked
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
      summary: Authenticate by email/password
      tags:
      - auth
  /auth/logout:
    post:
      description: 'Stateless JWT: the client discards both tokens. A server-side
        blocklist will be added post-MVP.'
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Log out
      tags:
      - auth
  /auth/me:
    get:
      description: Returns id, email and role of the user owning the access token.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.MeResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Return the authenticated user
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: The old refresh token is implicitly invalidated on the client side
        (stateless MVP).
      parameters:
      - description: Refresh token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.TokenResponse'
        "400":
          description: validation_error
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
        "401":
          description: invalid or expired token
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
      summary: Exchange a refresh token for a new token pair
      tags:
      - auth
  /cluster/overview:
    get:
      description: 'Aggregated health and capacity of the orchestration cluster (nodes,
        CPU/memory) combined with catalog and deployment-activity counts. Cluster
        health is best-effort: when the orchestrator is unreachable the counts are
        still returned with cluster.reachable=false.'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ClusterOverviewResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Cluster dashboard overview
      tags:
      - cluster
  /clusters:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ClusterListResponse'
      security:
      - BearerAuth: []
      summary: List clusters
      tags:
      - cluster
    post:
      consumes:
      - application/json
      parameters:
      - description: Cluster
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.CreateClusterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ClusterResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Register a cluster
      tags:
      - cluster
  /clusters/{id}:
    delete:
      parameters:
      - description: Cluster ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "409":
          description: default or non-empty cluster
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Remove a cluster
      tags:
      - cluster
    get:
      parameters:
      - description: Cluster ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ClusterResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get a cluster
      tags:
      - cluster
    patch:
      consumes:
      - application/json
      parameters:
      - description: Cluster ID
        in: path
        name: id
        required: true
        type: string
      - description: Patch
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.UpdateClusterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ClusterResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Patch a cluster
      tags:
      - cluster
  /clusters/{id}/default:
    put:
      parameters:
      - description: Cluster ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ClusterResponse'
      security:
      - BearerAuth: []
      summary: Promote a cluster to default
      tags:
      - cluster
  /clusters/{id}/enroll:
    post:
      description: Switches the cluster to agent connection mode (if needed) and returns
        a one-time enrollment token plus a ready-to-run deploy command. The token
        is shown only once.
      parameters:
      - description: Cluster ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.EnrollClusterResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Issue an agent enrollment token
      tags:
      - clusters
  /clusters/{id}/overview:
    get:
      description: Same payload as /cluster/overview but with node health scoped to
        the given cluster.
      parameters:
      - description: Cluster ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ClusterOverviewResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_orange_hivemind_internal_adapters_api_dto.ErrorResponse'
        "404":
