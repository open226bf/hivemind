name: build-image

# Builds the single image that serves both the API and the embedded Angular UI,
# and pushes it to Docker Hub. The frontend (orange/hivemind-gui, public) is
# checked out into ./gui so it is part of the Docker build context.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  IMAGE: open226/hivemind

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout backend
        uses: actions/checkout@v4

      - name: Checkout frontend (public)
        uses: actions/checkout@v4
        with:
          repository: open226/hivemind-gui
          ref: main
          path: gui

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
