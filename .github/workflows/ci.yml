name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Ratchet floor: current coverage is ~28%. This gate only prevents regression
  # below the floor — raise it as tests are added (target 60%). See the coverage
  # tracking issue.
  COVERAGE_THRESHOLD: "25"

jobs:
  quality:
    name: Lint & static checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify dependencies are tidy
        run: |
          go mod download
          go mod verify

      - name: gofmt (formatting)
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          # v8 + golangci-lint v2 is built with a current Go; the v1 line
          # (capped by action@v6) is built with go1.24 and refuses the go1.25
          # target in go.mod ("can't load config: ... lower than targeted").
          version: latest

  coverage:
    name: Tests & coverage
    runs-on: ubuntu-latest
    # Expose the secret as an env var so the Codecov step can be gated in `if:`.
    # The `secrets` context is NOT allowed in `if:` — using it there fails the
    # whole workflow at startup (0s run, no jobs).
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests with coverage
        run: |
          go test -race -covermode=atomic -coverprofile=coverage.out -coverpkg=./... ./...

      - name: Compute coverage
        id: cov
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub(/%/, "", $3); print $3}')
          echo "total=$total" >> "$GITHUB_OUTPUT"

          echo "## Coverage: ${total}%" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Threshold: ${COVERAGE_THRESHOLD}%" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "<details><summary>Per-function coverage</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          go tool cover -func=coverage.out >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce coverage threshold
        run: |
          total="${{ steps.cov.outputs.total }}"
          min="${COVERAGE_THRESHOLD}"

          awk -v t="$total" -v m="$min" 'BEGIN {
            if (t+0 < m+0) {
              printf "::error::Coverage %.1f%% is below required %s%%\n", t, m;
              exit 1
            }
            printf "Coverage %.1f%% meets required %s%%\n", t, m
          }'

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage
          path: |
            coverage.out
          retention-days: 14

      - name: Upload to Codecov
        if: env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v4
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: coverage.out
          fail_ci_if_error: false