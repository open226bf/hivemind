name: Feature request
description: Suggest an idea or enhancement for Hivemind
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to do, and what's missing or painful today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Sketches, API shapes, or UI ideas welcome.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
